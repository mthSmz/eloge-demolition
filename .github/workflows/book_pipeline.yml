name: Book Critique Pipeline

permissions:
  contents: write

on:
  workflow_dispatch:
    inputs:
      book_title:
        description: "Book title"
        required: true
        default: "Dune"

jobs:
  generate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Collect book metadata
        run: |
          python scripts/collect_book.py "${{ github.event.inputs.book_title }}"

      - name: Generate critique
        run: |
          python scripts/generate_local.py

      - name: Commit results
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add input.json data/critics/generated.json
          git commit -m "Auto critique generation"
          git push
